workflows:
  ios-workflow:
    name: Pervin Muellim iOS
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: "az.pervinmuellim.app"
        XCODE_PROJECT: "PervinMuellim.xcodeproj"
        XCODE_SCHEME: "PervinMuellim"
        APPLE_TEAM_ID: "TA5QW3L6ZW"
    scripts:
      - name: Build iOS
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/PervinMuellim.xcarchive \
            archive
    artifacts:
      - build/PervinMuellim.xcarchive
