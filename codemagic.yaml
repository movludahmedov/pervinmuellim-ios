workflows:
  ios-workflow:
    name: Pervin Muellim iOS
    max_build_duration: 60
    environment:
      xcode: 16.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: az.pervinmuellim.app
      vars:
        XCODE_PROJECT: "PervinMuellim.xcodeproj"
        XCODE_SCHEME: "PervinMuellim"
    scripts:
      - name: Build iOS
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/PervinMuellim.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/PervinMuellim.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/
      - name: Upload to App Store
        script: |
          echo "$APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY" > /tmp/AuthKey_DJRA7MG4HM.p8
          xcrun altool \
            --upload-app \
            --type ios \
            --file "build/Pervin Muellim.ipa" \
            --apiKey "DJRA7MG4HM" \
            --apiIssuer "f7f1d0af-5912-4f29-a83b-c24a32e55666" \
            --private-key /tmp/AuthKey_DJRA7MG4HM.p8 \
            --verbose
    artifacts:
      - build/*.ipa
