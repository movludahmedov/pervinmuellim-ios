workflows:
  ios-workflow:
    name: Pervin Muellim iOS
    max_build_duration: 60
    environment:
      xcode: "16.2"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: az.pervinmuellim.app
      vars:
        XCODE_PROJECT: "PervinMuellim.xcodeproj"
        XCODE_SCHEME: "PervinMuellim"
    scripts:
      - name: Build iOS
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/PervinMuellim.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/PervinMuellim.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/
      - name: Upload to App Store
        script: |
          echo "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          app-store-connect publish \
            --path "build/Pervin Muellim.ipa" \
            --key-id "DJRA7MG4HM" \
            --issuer-id "f7f1d0af-5912-4f29-a83b-c24a32e55666" \
            --private-key @file:/tmp/AuthKey.p8
    artifacts:
      - build/*.ipa
