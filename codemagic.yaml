workflows:
  ios-workflow:
    name: "Pervin Muellim iOS"
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: "16.2"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: az.pervinmuellim.app
      vars:
        XCODE_PROJECT: "PervinMuellim.xcodeproj"
        XCODE_SCHEME: "PervinMuellim"
    scripts:
      - name: "Build iOS"
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/PervinMuellim.xcarchive \
            archive
      - name: "Export IPA"
        script: |
          xcodebuild -exportArchive \
            -archivePath build/PervinMuellim.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/
    artifacts:
      - build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
