workflows:
  ios-workflow:
    name: Pervin Muellim iOS
    max_build_duration: 60
    integrations:
      app_store_connect: AC_API_KEY
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: az.pervinmuellim.app
      vars:
        BUNDLE_ID: "az.pervinmuellim.app"
        XCODE_PROJECT: "PervinMuellim.xcodeproj"
        XCODE_SCHEME: "PervinMuellim"
    scripts:
      - name: Build iOS
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/PervinMuellim.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/PervinMuellim.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/
    artifacts:
      - build/*.ipa
