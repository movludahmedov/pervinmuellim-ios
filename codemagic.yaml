workflows:
  ios-workflow:
    name: Pervin Muellim iOS
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: "az.pervinmuellim.app"
        XCODE_PROJECT: "PervinMuellim.xcodeproj"
        XCODE_SCHEME: "PervinMuellim"
        APPLE_TEAM_ID: "TA5QW3L6ZW"
      groups:
        - New group
    scripts:
      - name: Set up signing
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/PervinMuellim.mobileprovision
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P $CM_CERTIFICATE_PASSWORD -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/PervinMuellim.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build iOS
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -archivePath build/PervinMuellim.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/PervinMuellim.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/
    artifacts:
      - build/*.ipa
